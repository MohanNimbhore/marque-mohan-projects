<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employees Table</title>
  <style>
    table {
      border-collapse: collapse;
      width: 80%;
      margin: 20px auto;
    }
    th, td {
      border: 1px solid black;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: lightgray;
    }
  </style>
</head>
<body>

  <h2 style="text-align:center;">Employees Data</h2>
  <table id="empTable">
    <thead>
      <tr>
        <th>Employee ID</th>
        <th>Name</th>
        <th>Salary</th>
        <th>Age</th>
        <th>Country</th>
        <th>Department</th>
      </tr>
    </thead>
    <tbody>
      
    </tbody>
  </table>

  <script>
    let employees = [
      new Employee("Emp102", "bhupendr", 70, 50, "india", "IT"),
      new Employee("Emp103", "rohan", 50, 14, "london", "Finance"),
      new Employee("Emp104", "kartik", 3, 2, "america", "HR"),
      new Employee("Emp105", "suraj", 2, 19, "russia", "Finance"),
      new Employee("Emp106", "aryan", 1, 70, "japan", "HR"),
      new Employee("Emp107", "aryan", 88, 40, "japan", "IT"),
      new Employee("Emp108", "jatin", 100, 12, "russia", "HR"),
      new Employee("Emp109", "aaditya", 20, 19, "india", "Marketing"),
      new Employee("Emp110", "sachi", 1, 2, "uganda", "Finance"),
      new Employee("Emp111", "khushi", 35, 99, "brazil", "IT"),
      new Employee("Emp112", "parul", 500, 34, "jamaica", "CEO")
    ];

    let tbody = document.querySelector("#empTable tbody");

    employees.forEach(emp => {
      let row = `<tr>
        <td>${emp.employees_id}</td>
        <td>${emp.name}</td>
        <td>${emp.salary}</td>
        <td>${emp.age}</td>
        <td>${emp.country}</td>
        <td>${emp.department}</td>
      </tr>`;
      tbody.innerHTML += row;
    });
    class Employee {
      constructor(employees_id, name, salary, age, country, department) {
        this.employees_id = employees_id;
        this.name = name;
        this.salary = salary;
        this.age = age;
        this.country = country;
        this.department = department;
      }
    }
  </script>

</body>
</html>
