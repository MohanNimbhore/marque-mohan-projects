<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
</head>
<Style>
    body {
        margin-top: 50px;
        font-family: Arial, sans-serif;
        text-align: center;
        color: #b66767;
    }

    button {
        margin: 5px;
        padding: 10px 20px;
        font-size: 16px;
        color: #fff;
        background-color: #b66767;
        border: none;
        border-radius: 5px;
    }
    .increment {
        color: #fff;
    }
</Style>
<body>
    <h1>Counter</h1>
    <p>Count: <span id="count">0</span></p>

    <button onclick="increment()">Increment</button>
    <button onclick="decrement()">Decrement</button>
    <button onclick="reset()">Reset</button>
    <!-- <button onclick="increment()">Increment</button>
    <button onclick="decrement()">Decrement</button>
    <button onclick="reset()">Reset</button> -->

    <script>
        let count = 0;
        const countElement = document.getElementById('count');

        function updateCount() {
            countElement.textContent = count;
        }

        function increment() {
            count++;
            updateCount();
        }

        function decrement() {
            count--;
            updateCount();
            if (count <= 0) {
                count = 0;
                updateCount();
            }
        }

        function reset() {
            count = 0;
            updateCount();
        }
    </script>
</body>
</html>
