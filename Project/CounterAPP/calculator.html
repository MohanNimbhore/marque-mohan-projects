<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #667eea;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            color: #f2f2f2;
        }
        .calculator {
            width: 360px;
            background: #0f0f1e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .display {
            background: #16213e;
            padding: 24px 20px;
            text-align: right;
            font-size: 2.2rem;
            letter-spacing: 1px;
            min-height: 90px;
            word-wrap: break-word;
        }
        .display .expression {
            font-size: 1rem;
            color: #a8b5ff;
            margin-bottom: 8px;
            min-height: 20px;
        }
        .display .result {
            font-size: 2.4rem;
            color: #ffffff;
            min-height: 42px;
        }
        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 20px;
            background: #0a0a15;
        }
        button {
            font-size: 1.3rem;
            border: none;
            border-radius: 14px;
            padding: 18px 0;
            color: #f2f2f2;
            background: #2d2d44;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
        }
        button:hover {
            background: #4a5278;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.4);
        }
        .operator {
            background: #f5576c;
            color: #ffffff;
        }
        .operator:hover {
            background: #f77580;
        }
        .span-two {
            grid-column: span 2;
        }
        .secondary {
            background: #5a6a8a;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression">0</div>
            <div class="result" id="result">0</div>
        </div>
        <div class="keys">
            <button class="secondary" data-action="clear">AC</button>
            <button class="secondary" data-action="delete">DEL</button>
            <button class="secondary" data-action="percent">%</button>
            <button class="operator" data-action="operator">/</button>
            <button data-action="number">7</button>
            <button data-action="number">8</button>
            <button data-action="number">9</button>
            <button class="operator" data-action="operator">*</button>
            <button data-action="number">4</button>
            <button data-action="number">5</button>
            <button data-action="number">6</button>
            <button class="operator" data-action="operator">-</button>
            <button data-action="number">1</button>
            <button data-action="number">2</button>
            <button data-action="number">3</button>
            <button class="operator" data-action="operator">+</button>
            <button class="span-two" data-action="number">0</button>
            <button data-action="number">.</button>
            <button class="operator" data-action="equals">=</button>
        </div>
    </div>
    <script>
        const expressionEl = document.getElementById('expression');
        const resultEl = document.getElementById('result');
        let expression = '';
        let result = '';
        function updateDisplay() {
            expressionEl.textContent = expression || '0';
            resultEl.textContent = result || '0';
        }
        function appendNumber(value) {
            if (value === '.' && expression.slice(-1) === '.') return;
            if (value === '.' && /[+\-*/]?$/.test(expression)) {
                expression += '0.';
            } else {
                expression += value;
            }
        }
        function appendOperator(operator) {
            if (!expression) return;
            if (/[+\-*/]$/.test(expression)) {
                expression = expression.slice(0, -1) + operator;
            } else {
                expression += operator;
            }
        }
        function clearCalculator() {
            expression = '';
            result = '';
        }
        function deleteLast() {
            expression = expression.slice(0, -1);
        }
        function calculatePercent() {
            if (!expression) return;
            try {
                const value = eval(expression);
                result = String(value / 100);
            } catch (e) {
                result = 'Error';
            }
        }
        function computeResult() {
            if (!expression) return;
            try {
                const sanitized = expression.replace(/[^0-9.+\-*/()]/g, '');
                const value = eval(sanitized);
                result = String(value);
                expression = result;
            } catch (e) {
                result = 'Error';
            }
        }
        document.querySelector('.keys').addEventListener('click', event => {
            const button = event.target.closest('button');
            if (!button) return;
            const action = button.dataset.action;
            const buttonText = button.textContent;

            switch (action) {
                case 'number':
                    appendNumber(buttonText);
                    break;
                case 'operator':
                    appendOperator(buttonText);
                    break;
                case 'clear':
                    clearCalculator();
                    break;
                case 'delete':
                    deleteLast();
                    break;
                case 'percent':
                    calculatePercent();
                    break;
                case 'equals':
                    computeResult();
                    break;
            }
            updateDisplay();
        });

        updateDisplay();
    </script>
</body>
</html>
