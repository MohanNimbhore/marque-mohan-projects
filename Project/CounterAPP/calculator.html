<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
</head>
<body style="font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f0f0;">

  <div style="background:#fff">
    <input id="display" type="text" readonly 
           style="width:220px; height:40px; margin-bottom:10px; text-align:right; font-size:18px; padding:5px; border:1px solid #ccc; border-radius:5px;" />

    <div style="display:grid; grid-template-columns:repeat(4, 55px); gap:5px;">
      <!-- Number buttons -->
      <button onclick="press('7')" style="height:40px;">7</button>
      <button onclick="press('8')" style="height:40px;">8</button>
      <button onclick="press('9')" style="height:40px;">9</button>
      <button onclick="press('/')" style="height:40px;">÷</button>

      <button onclick="press('4')" style="height:40px;">4</button>
      <button onclick="press('5')" style="height:40px;">5</button>
      <button onclick="press('6')" style="height:40px;">6</button>
      <button onclick="press('*')" style="height:40px;">×</button>

      <button onclick="press('1')" style="height:40px;">1</button>
      <button onclick="press('2')" style="height:40px;">2</button>
      <button onclick="press('3')" style="height:40px;">3</button>
      <button onclick="press('-')" style="height:40px;">−</button>

      <button onclick="press('0')" style="height:40px;">0</button>
      <button onclick="press('.')" style="height:40px;">.</button>
      <button onclick="calculate()" style="height:40px; background:#4CAF50; color:#fff;">=</button>
      <button onclick="press('+')" style="height:40px;">+</button>

      <!-- Clear button -->
      <button onclick="clearDisplay()" style="grid-column: span 4; height:40px; background:#f44336; color:#fff;">C</button>
    </div>
  </div>

  <script>
    function press(val) {
      document.getElementById("display").value += val;
    }
    function calculate() {
      try {
        document.getElementById("display").value = eval(document.getElementById("display").value);
      } catch {
        document.getElementById("display").value = "Error";
      }
    }
    function clearDisplay() {
      document.getElementById("display").value = "";
    }
  </script>

</body>
</html>
