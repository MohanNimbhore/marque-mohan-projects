<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blinkit Clone</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
    }

    /* Navbar */

    nav{
      background:#f7c600;
      padding:15px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
    }

    .logo{
      font-size:30px;
      font-weight:bold;
      color:green;
    }

    .search-box input{
      width:400px;
      padding:12px;
      border:none;
      border-radius:8px;
      outline:none;
    }

    .nav-btn button{
      padding:10px 20px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-left:10px;
      font-weight:bold;
    }

    .login{
      background:white;
    }

    .cart{
      background:green;
      color:white;
    }

    /* Hero Section */

    .hero{
      background:linear-gradient(to right, green, yellow);
      color:white;
      text-align:center;
      padding:100px 20px;
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:22px;
      margin-bottom:30px;
    }

    .hero button{
      padding:15px 35px;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      background:white;
      color:green;
      font-weight:bold;
    }

    /* Categories */

    .categories{
      padding:50px;
    }

    .categories h2{
      margin-bottom:30px;
      font-size:35px;
    }

    .category-box{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:20px;
    }

    .category{
      background:white;
      padding:30px;
      text-align:center;
      border-radius:15px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .category:hover{
      transform:translateY(-5px);
    }

    .category h3{
      margin-top:10px;
    }

    /* Products */

    .products{
      padding:50px;
    }

    .products h2{
      margin-bottom:30px;
      font-size:35px;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .product{
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
    }

    .product img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .product-content{
      padding:20px;
    }

    .product-content h3{
      margin-bottom:10px;
    }

    .price-cart{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:15px;
    }

    .price{
      color:green;
      font-size:22px;
      font-weight:bold;
    }

    .add-btn{
      background:green;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:8px;
      cursor:pointer;
    }

    /* Footer */

    footer{
      background:black;
      color:white;
      text-align:center;
      padding:25px;
      margin-top:40px;
    }

  </style>

</head>
<body>

  <!-- Navbar -->

  <nav>

    <div class="logo">blinkit</div>

    <div class="search-box">
      <input type="text" placeholder="Search products...">
    </div>

    <div class="nav-btn">
      <button class="login">Login</button>
      <button class="cart">Cart</button>
    </div>

  </nav>

  <!-- Hero Section -->

  <section class="hero">

    <h1>Groceries delivered in minutes</h1>

    <p>Order fruits, vegetables, snacks and daily essentials online</p>

    <button>Shop Now</button>

  </section>

  <!-- Categories -->

  <section class="categories">

    <h2>Categories</h2>

    <div class="category-box">

      <div class="category">
        🍎
        <h3>Fruits</h3>
      </div>

      <div class="category">
        🥦
        <h3>Vegetables</h3>
      </div>

      <div class="category">
        🥛
        <h3>Dairy</h3>
      </div>

      <div class="category">
        🍟
        <h3>Snacks</h3>
      </div>

      <div class="category">
        🥤
        <h3>Drinks</h3>
      </div>

    </div>

  </section>

  <!-- Products -->

  <section class="products">

    <h2>Popular Products</h2>

    <div class="product-grid">

      <div class="product">

        <img src="https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?q=80&w=800">

        <div class="product-content">

          <h3>Fresh Apples</h3>

          <div class="price-cart">
            <span class="price">₹120</span>
            <button class="add-btn">Add</button>
          </div>

        </div>

      </div>

      <div class="product">

        <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=800">

        <div class="product-content">

          <h3>Bread</h3>

          <div class="price-cart">
            <span class="price">₹40</span>
            <button class="add-btn">Add</button>
          </div>

        </div>

      </div>

      <div class="product">

        <img src="https://images.unsplash.com/photo-1585238342024-78d387f4a707?q=80&w=800">

        <div class="product-content">

          <h3>Potato Chips</h3>

          <div class="price-cart">
            <span class="price">₹20</span>
            <button class="add-btn">Add</button>
          </div>

        </div>

      </div>

      <div class="product">

        <img src="https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?q=80&w=800">

        <div class="product-content">

          <h3>Bananas</h3>

          <div class="price-cart">
            <span class="price">₹60</span>
            <button class="add-btn">Add</button>
          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->

  <footer>

    <p>© 2026 Blinkit Clone Website</p>

  </footer>

</body>
</html>
