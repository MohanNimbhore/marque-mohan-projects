<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        .container{
        height: 450px;
        width: 300px;
        background-color: azure;
        border-radius: 10px;
        border: 2px solid black;
        display: flex;
        flex-direction: row;
        margin-left: 400px;
        margin-top: 50px;
            flex-wrap: wrap;
        }
        .small{
            width: 300px;
            height: 150px;
            background-color: blue;
            border: 1px solid black;
            display: flex;
            flex-direction: row;
        justify-content: center;
            border-radius: 10px;
                flex-wrap: wrap;
    
        }
        .circle{
            width:150px;
            height: 150px;
            background-color:white;
            border-radius: 100%;
            border: 1px solid blue;
            display: flex;
            flex-direction: row;
            justify-content: center;
            margin-top: 60px;
            background-image: url(naruto.png);
            background-position: center;
            flex-wrap: wrap;
        }
       .con2{
        height: 100px;
        width: 300px;
        background-color:  azure;
        display: flex;
        text-align: center;
        margin-top:13px;
        margin-left: 90px;
        color:black;
        font-size: medium;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        flex-wrap: wrap;
       }
       .con3{
        height: 60px;
        width: 900px;
        background-color:  azure;
        display: flex;
        text-align: center;
        margin-top:13px;
        /* margin-left: 90px; */
        color:black;
        font-size: medium;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        flex-wrap: wrap;
        
       }
       .box1{
        height: 50px;
        width: 50px;
        /* margin-inline-end: auto; */
        margin-left: auto;
        background-color: red;
        border-radius: 100%;
        border: 1px solid blue; 
       }
         .box2{
          height: 50px;
          width: 50px;
          margin-inline-end: auto;
          margin-left: auto;
          background-color: green;
          border-radius: 100%;
          border: 1px solid blue; 
         }
            .box3{
            height: 50px;
            width: 50px;
            margin-inline-end: auto;
            margin-right: auto;
            background-color: yellow;
            border-radius: 100%;
            border: 1px solid blue; 
            }   
                .box4{
                 height: 50px;
                 width: 50px;
                 margin-inline-end: auto;
                 margin-right: auto;
                 background-color: black;
                 border-radius: 100%;
                 border: 1px solid blue; 
                } 
        .con4{
            height: 50px;
            width: 135px;
            background-color: rgb(0, 64, 255);
            display: inline;
             border-radius: 200px;
             margin-right: 10px;


        }
        .con5{
            height: 50px;
            width: 135px;
            background-color: rgb(0, 64, 255);
            display: inline;
            border-radius: 200px;

        }        

      
    </style>
</head>
<body>
    <div class="container">
        <div class="small">
            <div class="circle"></div>
            <div class="con2"> CodingLab<br>YouTuer &amp Blogger </div>
            <div class="con3">
                <div class="box1"></div>
                <div class="box2"></div>
                <div class="box3"></div>
                <div class="box4"></div>
            </div>
            <div class="con4">Facebook</div>
            <div class="con5">instagram</div>
        </div>
    </div>
</body>
</html>
